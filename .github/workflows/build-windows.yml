name: Build onnx2c (Windows, manual vcpkg)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1) Checkout with submodules (onnx schema is a submodule)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Bootstrap vcpkg locally (no manifest required)
      - name: Bootstrap vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg $env:GITHUB_WORKSPACE\vcpkg
          & $env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat

      # 3) Install Protobuf for MSVC x64
      - name: vcpkg install protobuf
        shell: powershell
        run: |
          & $env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe install protobuf:x64-windows
          # (You can use x64-windows-static if you prefer static libs.)

      # 4) Configure CMake to use the vcpkg toolchain (so FindProtobuf resolves)
      - name: Configure (CMake)
        run: >
          cmake -S . -B build -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="%GITHUB_WORKSPACE%\vcpkg\scripts\buildsystems\vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      # 5) Build the onnx2c target
      - name: Build
        run: cmake --build build --config Release --target onnx2c

      # 6) Package the executable and license/readme
      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\onnx2c.exe dist\
          Copy-Item README.md dist\
          Copy-Item LICENSE.txt dist\

      # 7) Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx2c-windows-x64
          path: dist
