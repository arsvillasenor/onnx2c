name: Build onnx2c (Windows, manual vcpkg)

on:
  workflow_dispatch: {}   # Run manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1) Checkout the repo WITH submodules (onnx schema is a submodule)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Bootstrap vcpkg locally (clone relative to repo to avoid path-expansion issues)
      - name: Bootstrap vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg vcpkg
          ./vcpkg/bootstrap-vcpkg.bat

      # 3) Install Protobuf for MSVC x64 (first run may take ~10–20 min)
      - name: vcpkg install protobuf
        shell: powershell
        run: |
          ./vcpkg/vcpkg.exe install protobuf:x64-windows

      # 4) Configure with CMake using the vcpkg toolchain file (local relative path)
      - name: Configure (CMake)
        run: >
          cmake -S . -B build -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      # 5) Build the onnx2c target
      - name: Build
        run: cmake --build build --config Release --target onnx2c

      # 6) Package the executable plus license/readme (convenient artifact)
      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\onnx2c.exe dist\
          Copy-Item README.md dist\
          Copy-Item LICENSE.txt dist\

      # 7) Upload artifact (download from the run page)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx2c-windows-x64
          path: dist
