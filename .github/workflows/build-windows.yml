name: Build onnx2c (Windows, vcpkg, benchmark disabled)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg vcpkg
          ./vcpkg/bootstrap-vcpkg.bat

      - name: vcpkg install protobuf
        shell: powershell
        run: |
          ./vcpkg/vcpkg.exe install protobuf:x64-windows

      # Disable the benchmark subdir so regex backend probing is skipped on Windows.
      - name: Disable benchmark subdir (bash)
        shell: bash
        run: |
          set -euo pipefail
          if [ -d benchmark ]; then
            # Write a tiny, valid CMake file to turn benchmark into a no-op
            printf '%s\n%s\n%s\n' \
              'cmake_minimum_required(VERSION 3.16)' \
              '# Intentionally empty to disable benchmark build on CI.' \
              'return()' \
              > benchmark/CMakeLists.txt
            echo "Wrote benchmark/CMakeLists.txt:"
            sed -n '1,50p' benchmark/CMakeLists.txt
          else
            echo "No benchmark/ dir at $(pwd) — skipping."
          fi

      - name: Configure (CMake)
        run: >
          cmake -S . -B build -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release --target onnx2c

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\onnx2c.exe dist\
          Copy-Item README.md dist\
          Copy-Item LICENSE.txt dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx2c-windows-x64
          path: dist
