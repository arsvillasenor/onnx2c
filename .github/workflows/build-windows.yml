name: Build onnx2c (Windows, vcpkg, benchmark disabled)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1) Checkout with submodules (onnx schema submodule is required)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Bootstrap vcpkg (clone relative to repo to avoid path issues)
      - name: Bootstrap vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg vcpkg
          ./vcpkg/bootstrap-vcpkg.bat

      # 3) Install Protobuf (first run may take ~10–20 min)
      - name: vcpkg install protobuf
        shell: powershell
        run: |
          ./vcpkg/vcpkg.exe install protobuf:x64-windows

      # 4) Disable the benchmark subproject (make it a no-op)
      # This prevents regex backend probing on Windows/MSVC.
      - name: Disable benchmark subdir
        shell: powershell
        run: |
          if (Test-Path "benchmark/CMakeLists.txt") {
            @"
cmake_minimum_required(VERSION 3.16)
# Intentionally empty to disable benchmark build on CI.
return()
"@ | Out-File -FilePath "benchmark/CMakeLists.txt" -Encoding UTF8 -Force
          }

      # 5) Configure CMake using vcpkg toolchain
      - name: Configure (CMake)
        run: >
          cmake -S . -B build -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      # 6) Build only the onnx2c tool
      - name: Build
        run: cmake --build build --config Release --target onnx2c

      # 7) Package the executable + license/readme
      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\onnx2c.exe dist\
          Copy-Item README.md dist\
          Copy-Item LICENSE.txt dist\

      # 8) Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx2c-windows-x64
          path: dist
``
