name: Build onnx2c (Windows via vcpkg)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1) Checkout the repo WITH submodules (onnx2c needs the ONNX schema submodule)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2) Install vcpkg and the required dependency (protobuf)
      #    This action caches vcpkg artifacts to speed up subsequent runs.
      - name: Setup vcpkg and install protobuf
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgTriplet: x64-windows-static
          # Install protobuf runtime + development files for MSVC toolchain
          # You can add more ports separated by spaces if needed.
          runVcpkgInstall: true
          vcpkgArguments: protobuf
          # Optional: Pin a vcpkg commit for reproducibility
          # vcpkgGitCommitId: 5b1214315250939257ef5d62ecdcbca18cf4fb1c

      # 3) Configure with CMake using vcpkg toolchain so FindProtobuf resolves
      - name: Configure (CMake)
        run: >
          cmake -S . -B build -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake"

      # 4) Build the onnx2c target
      - name: Build
        run: cmake --build build --config Release --target onnx2c

      # 5) Package the executable and license/readme
      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\onnx2c.exe dist\
          Copy-Item README.md dist\
          Copy-Item LICENSE.txt dist\

      # 6) Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx2c-windows-x64
          path: dist
