name: Build onnx2c (Windows)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Protobuf
        shell: powershell
        run: |
          choco install protoc --yes
          choco install protobuf --yes

      - name: Configure CMake
        run: cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target onnx2c

      - name: Package
        run: |
          mkdir dist
          copy build/Release/onnx2c.exe dist/
          copy LICENSE.txt dist/
          copy README.md dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx2c-windows-x64
          path: dist
