name: Build onnx2c (Windows, vcpkg, benchmark+MSVC fixes)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        shell: powershell
        run: |
          git clone https://github.com/microsoft/vcpkg vcpkg
          ./vcpkg/bootstrap-vcpkg.bat

      - name: vcpkg install protobuf
        shell: powershell
        run: |
          ./vcpkg/vcpkg.exe install protobuf:x64-windows

      # --- 1) Disable the benchmark subdir (Windows regex probe fails there) ---
      - name: Disable benchmark subdir (bash)
        shell: bash
        run: |
          set -euo pipefail
          if [ -d benchmark ]; then
            # Make benchmark a no-op to skip regex backend checks on Windows
            printf '%s\n%s\n%s\n' \
              'cmake_minimum_required(VERSION 3.16)' \
              '# Intentionally empty to disable benchmark build on CI.' \
              'return()' \
              > benchmark/CMakeLists.txt
            echo "Wrote benchmark/CMakeLists.txt"
          else
            echo "No benchmark/ dir — skipping."
          fi

      # --- 2) Strip GCC-only flags so MSVC won't see /Werror (D8021) ---
      - name: Patch GCC-only flags for MSVC
        shell: bash
        run: |
          set -euo pipefail
          # Files that set/add GCC/Clang-only flags
          for f in CMakeLists.txt cmake_timestamp/CMakeLists.txt benchmark/CMakeLists.txt; do
            if [ -f "$f" ]; then
              # Drop flags that break MSVC
              sed -i 's/-Wfatal-errors//g' "$f"
              sed -i 's/-Werror//g'        "$f"
              sed -i 's/-Wall//g'          "$f"   # optional, keeps MSVC output sane
            fi
          done
          echo "Patched CMakeLists to drop -Wfatal-errors/-Werror/(-Wall) for MSVC."

      # --- 3) Make the build use the actual protoc path from find_package(Protobuf) ---
      # The upstream CMakeLists uses a hard-coded `protoc` command (fails on Windows PATH).
      # Replace it with ${Protobuf_PROTOC_EXECUTABLE}.
      - name: Patch protoc invocation
        shell: bash
        run: |
          set -euo pipefail
          if grep -q "COMMAND[[:space:]]\+protoc[[:space:]]" CMakeLists.txt; then
            # Replace only the leading 'protoc ' token of that COMMAND line
            # (keep --proto_path and the rest untouched)
            sed -i 's/COMMAND[[:space:]]\+protoc[[:space:]]\+/COMMAND ${Protobuf_PROTOC_EXECUTABLE} /' CMakeLists.txt
            echo "Patched CMakeLists.txt to use \${Protobuf_PROTOC_EXECUTABLE}."
          else
            echo "No bare 'protoc' invocation found in CMakeLists.txt."
          fi

      - name: Configure (CMake)
        run: >
          cmake -S . -B build -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release --target onnx2c

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\Release\onnx2c.exe dist\
          Copy-Item README.md dist\
          Copy-Item LICENSE.txt dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx2c-windows-x64
          path: dist
