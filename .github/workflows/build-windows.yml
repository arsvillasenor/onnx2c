name: Build onnx2c (Windows)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Protobuf ZIP (robust)
        shell: powershell
        run: |
          $curl = "C:\\Windows\\System32\\curl.exe"
          
          # Protobuf stable mirror (latest stable win64)
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protobuf-3.21.12-win64.zip"

          & $curl --fail --location $url -o protobuf.zip

          # Check size > 0
          $size = (Get-Item protobuf.zip).Length
          if ($size -lt 100000) {
            Write-Error "Downloaded protobuf.zip is too small ($size bytes). Download failed."
          }

      - name: Download 7zip Portable
        shell: powershell
        run: |
          $curl = "C:\\Windows\\System32\\curl.exe"
          & $curl --fail --location https://www.7-zip.org/a/7zr.exe -o 7zr.exe

      - name: Extract Protobuf using 7zip
        shell: powershell
        run: |
          .\7zr.exe x protobuf.zip -oprotobuf

      - name: Configure CMake
        run: |
          cmake -S . -B build -A x64 ^
            -DProtobuf_INCLUDE_DIR="protobuf\include" ^
            -DProtobuf_LIBRARY="protobuf\lib\libprotobuf.lib" ^
            -DProtobuf_PROTOC_EXECUTABLE="protobuf\bin\protoc.exe" ^
            -DCMAKE_BUILD_TYPE=Release

      - name: Build onnx2c
        run: cmake --build build --config Release --target onnx2c

      - name: Package
        shell: powershell
        run: |
          mkdir dist
          copy build\Release\onnx2c.exe dist\
          copy README.md dist\
          copy LICENSE.txt dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx2c-windows-x64
          path: dist
